services:
  # ── PostgreSQL (local dev only) ────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-bread}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bread}
      POSTGRES_DB: ${DB_NAME:-bread_order}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bread} -d ${DB_NAME:-bread_order}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
