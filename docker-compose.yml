services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: bread
      POSTGRES_PASSWORD: bread
      POSTGRES_DB: bread_order
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bread -d bread_order"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
