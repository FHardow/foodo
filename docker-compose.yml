services:
  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # VITE_API_URL left empty so API calls are relative to the same origin.
        # Traefik routes /api/* to the backend, everything else to this container.
        VITE_API_URL: ""
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bread-order}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-bread-frontend}
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`bread.${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80
    networks:
      - traefik-public
      - internal
    restart: unless-stopped

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    environment:
      ENV: production
      PORT: 8080
      DB_HOST: postgres
      DB_USER: ${DB_USER:-bread}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-bread_order}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bread-order}
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`bread.${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.routers.backend.priority=10
      - traefik.http.routers.uploads.rule=Host(`bread.${DOMAIN}`) && PathPrefix(`/uploads`)
      - traefik.http.routers.uploads.entrypoints=websecure
      - traefik.http.routers.uploads.tls.certresolver=letsencrypt
      - traefik.http.routers.uploads.priority=10
      - traefik.http.routers.uploads.service=backend
      - traefik.http.services.backend.loadbalancer.server.port=8080
    volumes:
      - uploads:/app/uploads
    networks:
      - traefik-public
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-bread}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-bread_order}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bread} -d ${DB_NAME:-bread_order}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

networks:
  traefik-public:
    external: true
  internal:

volumes:
  postgres_data:
